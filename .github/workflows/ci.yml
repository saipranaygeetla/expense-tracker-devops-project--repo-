name: Expense Tracker CI/CD

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build Spring Boot
        working-directory: backend
        run: mvn clean package -DskipTests

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: expense-trackergit 
          path: backend/target/*.jar

      - name: Build Docker Image
        working-directory: backend
        run: |
          docker build \
            -t saipranaygeetla/expense-tracker:${{ github.sha }} \
            -t saipranaygeetla/expense-tracker:latest .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Push Docker Image
        run: |
          docker push saipranaygeetla/expense-tracker:${{ github.sha }}
          docker push saipranaygeetla/expense-tracker:latest