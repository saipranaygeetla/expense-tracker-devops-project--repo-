version: "3.9"

services:

  postgres:
    image: postgres:17
    container_name: postgres

    environment:
      POSTGRES_DB: expense_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    networks:
      - expense-network

  expense-app:

    build:
      context: ./backend

    image: expense-tracker:v3

    ports:
      - "8080:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/expense_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root

    depends_on:
      - postgres
    
    networks:
      - expense-network

    healthcheck:
      test: ["CMD","wget","--spider","http://localhost:8080/hello"]

      interval: 20s

      timeout: 5s

      retries: 3

      start_period: 30s

volumes:

  postgres-data:

networks:

  expense-network: