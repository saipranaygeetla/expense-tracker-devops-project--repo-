apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: postgres
  namespace: expense-dev

spec:
  serviceName: postgres-headless

  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:

    metadata:
      labels:
        app: postgres

    spec:

      containers:

      - name: postgres

        image: postgres:17

        ports:
        - containerPort: 5432

        env:

        - name: POSTGRES_DB
          value: expens_db

        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_USER

        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD

        volumeMounts:

        - name: postgres-storage
          mountPath: /var/lib/postgresql/data

  volumeClaimTemplates:

  - metadata:
      name: postgres-storage

    spec:

      accessModes:
      - ReadWriteOnce

      resources:

        requests:

          storage: 2Gi