apiVersion: autoscaling/v2

kind: HorizontalPodAutoscaler

metadata:

  name: expense-hpa

  namespace: expense-dev

spec:

  scaleTargetRef:

    apiVersion: apps/v1

    kind: Deployment

    name: expense-app

  minReplicas: 2

  maxReplicas: 10

  metrics:

  - type: Resource

    resource:

      name: cpu

      target:

        type: Utilization

        averageUtilization: 70