apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor

metadata:
  name: expense-monitor
  namespace: monitoring
  labels:
    release: monitoring

spec:
  selector:
    matchLabels:
      app: expense-app

  namespaceSelector:
    matchNames:
      - expense-dev

  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s